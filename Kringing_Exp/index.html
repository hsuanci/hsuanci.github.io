<!DOCTYPE html>
<html>

<head>
  <title>kriging.js</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="kriging.js" type="text/javascript"></script>
  <script src="./polygons/tw.js" type="text/javascript"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.5.1/dist/leaflet.css" integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ==" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.5.1/dist/leaflet.js" integrity="sha512-GffPMF3RvMeYyc1LWMHtK8EbPv0iNZ8/oTtHPx9/cc2ILxQ+u905qIwdpULaqDkyBKgOaB57QTMg7ztg8Jm2Og==" crossorigin=""></script>
  <style type="text/css">
    html,
    body,
    #Lfmap {
      height: 100%;
      margin: 0px;
    }

    .loader {
      border: 16px solid #f3f3f3;
      border-radius: 50%;
      border-top: 16px solid #3498db;
      width: 120px;
      height: 120px;
      -webkit-animation: spin 2s linear infinite;
      /* Safari */
      animation: spin 2s linear infinite;
    }

    /* Safari */
    @-webkit-keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .info {
      padding: 6px 8px;
      font: 1.25rem Microsoft, Helvetica, sans-serif;
      font-family: Microsoft JhengHei;
      background: black;
      opacity: 0.8;
      -webkit-box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      border-radius: 5px;
    }

    .info h4 {
      margin: 0 0 5px;
      color: #777;
    }

    .legend {
      line-height: 18px;
      color: white;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="Lfmap"></div>
  <div id="loder" class="loader" style="position: absolute;left: 45%;top: 40%;z-index: 2500;"></div>
  <script type="text/javascript">
    var aqi = [];
    var lat = [];
    var lng = [];
    var map;
    var canvas;
    var variogram;
    var model = "exponential";
    var sigma2 = 0;
    var alpha = 10;
    var LeftTop = [25.30555, 119.478288];
    var RightDown = [21.897222, 122.743647];
    var LeftTopLc;
    var RightDownLc;
    var grid;
    var legend = L.control({
      position: 'bottomright'
    });
    var colors = ["#00A600", "#01A600", "#03A700", "#04A700", "#05A800", "#07A800", "#08A900", "#09A900", "#0BAA00", "#0CAA00", "#0DAB00", "#0FAB00", "#10AC00", "#12AC00", "#13AD00", "#14AD00", "#16AE00", "#17AE00", "#19AF00", "#1AAF00", "#1CB000",
      "#1DB000", "#1FB100", "#20B100", "#22B200", "#23B200", "#25B300", "#26B300", "#28B400", "#29B400", "#2BB500", "#2CB500", "#2EB600", "#2FB600", "#31B700", "#33B700", "#34B800", "#36B800", "#37B900", "#39B900", "#3BBA00", "#3CBA00", "#3EBB00",
      "#3FBB00", "#41BC00", "#43BC00", "#44BD00", "#46BD00", "#48BE00", "#49BE00", "#4BBF00", "#4DBF00", "#4FC000", "#50C000", "#52C100", "#54C100", "#55C200", "#57C200", "#59C300", "#5BC300", "#5DC400", "#5EC400", "#60C500", "#62C500", "#64C600",
      "#66C600", "#67C700", "#69C700", "#6BC800", "#6DC800", "#6FC900", "#71C900", "#72CA00", "#74CA00", "#76CB00", "#78CB00", "#7ACC00", "#7CCC00", "#7ECD00", "#80CD00", "#82CE00", "#84CE00", "#86CF00", "#88CF00", "#8AD000", "#8BD000", "#8DD100",
      "#8FD100", "#91D200", "#93D200", "#95D300", "#97D300", "#9AD400", "#9CD400", "#9ED500", "#A0D500", "#A2D600", "#A4D600", "#A6D700", "#A8D700", "#AAD800", "#ACD800", "#AED900", "#B0D900", "#B2DA00", "#B5DA00", "#B7DB00", "#B9DB00", "#BBDC00",
      "#BDDC00", "#BFDD00", "#C2DD00", "#C4DE00", "#C6DE00", "#C8DF00", "#CADF00", "#CDE000", "#CFE000", "#D1E100", "#D3E100", "#D6E200", "#D8E200", "#DAE300", "#DCE300", "#DFE400", "#E1E400", "#E3E500", "#E6E600", "#E6E402", "#E6E204", "#E6E105",
      "#E6DF07", "#E6DD09", "#E6DC0B", "#E6DA0D", "#E6D90E", "#E6D710", "#E6D612", "#E7D414", "#E7D316", "#E7D217", "#E7D019", "#E7CF1B", "#E7CE1D", "#E7CD1F", "#E7CB21", "#E7CA22", "#E7C924", "#E8C826", "#E8C728", "#E8C62A", "#E8C52B", "#E8C42D",
      "#E8C32F", "#E8C231", "#E8C133", "#E8C035", "#E8BF36", "#E9BE38", "#E9BD3A", "#E9BC3C", "#E9BB3E", "#E9BB40", "#E9BA42", "#E9B943", "#E9B945", "#E9B847", "#E9B749", "#EAB74B", "#EAB64D", "#EAB64F", "#EAB550", "#EAB552", "#EAB454", "#EAB456",
      "#EAB358", "#EAB35A", "#EAB35C", "#EBB25D", "#EBB25F", "#EBB261", "#EBB263", "#EBB165", "#EBB167", "#EBB169", "#EBB16B", "#EBB16C", "#EBB16E", "#ECB170", "#ECB172", "#ECB174", "#ECB176", "#ECB178", "#ECB17A", "#ECB17C", "#ECB17E", "#ECB27F",
      "#ECB281", "#EDB283", "#EDB285", "#EDB387", "#EDB389", "#EDB38B", "#EDB48D", "#EDB48F", "#EDB591", "#EDB593", "#EDB694", "#EEB696", "#EEB798", "#EEB89A", "#EEB89C", "#EEB99E", "#EEBAA0", "#EEBAA2", "#EEBBA4", "#EEBCA6", "#EEBDA8", "#EFBEAA",
      "#EFBEAC", "#EFBFAD", "#EFC0AF", "#EFC1B1", "#EFC2B3", "#EFC3B5", "#EFC4B7", "#EFC5B9", "#EFC7BB", "#F0C8BD", "#F0C9BF", "#F0CAC1", "#F0CBC3", "#F0CDC5", "#F0CEC7", "#F0CFC9", "#F0D1CB", "#F0D2CD", "#F0D3CF", "#F1D5D1", "#F1D6D3", "#F1D8D5",
      "#F1D9D7", "#F1DBD8", "#F1DDDA", "#F1DEDC", "#F1E0DE", "#F1E2E0", "#F1E3E2", "#F2E5E4", "#F2E7E6", "#F2E9E8", "#F2EBEA", "#F2ECEC", "#F2EEEE", "#F2F0F0", "#F2F2F2"
    ];
    $(document).ready(function() {
      $('#loder').hide();
      map = L.map('Lfmap', {
        maxZoom: 12
      }).setView([24.037779, 121.478288], 7);

      //Note:map.latLngToContainerPoint([21.897222, 122.743647]) 左上又下決定起始框
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      var myIcon = L.divIcon({
        iconSize: [0, 0],
        html: "<canvas id='map' style='opacity:0.5'></canvas>",
      });
      L.marker([25.316407, 119.478288], {
        icon: myIcon
      }).addTo(map);

      canvas = document.getElementById("map");

      legend.onAdd = function() {

        var div = L.DomUtil.create('div', 'info legend'),
          labels = ['極高風險', '高風險', '中高風險', '中風險', '中低風險', '低風險'],
          legendColor = ['#F2F2F2', '#EAB74B', '#E3E500', '#8AD000', '#3EBB00', '#00A600'];

        // loop through our density intervals and generate a label with a colored square for each interval
        for (var i = 0; i < labels.length; i++) {
          div.innerHTML +=
            '<i style="background:' + legendColor[i] + '"></i> ' +
            labels[i] + '<br>';
        }
        return div;
      };
      legend.addTo(map);

      map.on('zoomend', function() {
        LeftTopLc = map.latLngToContainerPoint(LeftTop);
        RightDownLc = map.latLngToContainerPoint(RightDown);
        DyWidth = RightDownLc.x - LeftTopLc.x;
        DyHeight = RightDownLc.y - LeftTopLc.y;
        canvas.width = DyWidth;
        canvas.height = DyHeight;
        kriging.plot(canvas, grid, [119.478288, 122.743647], [21.897222, 25.30555], colors);
      });
      getData()
    });

    function getData() {
      $('#loder').show();
      $.ajax({
        type: "GET",
        url: "https://opendata.epa.gov.tw/ws/Data/AQI/?$format=json",
        dataType: "jsonp",
        async: false,
        success: function(result) {
          for (i = 0; i < result.length; i++) {
            if (result[i].AQI != "") {
              aqi.push(result[i].AQI);
              lat.push(result[i].Latitude);
              lng.push(result[i].Longitude);
            } else {
              console.log(result[i].SiteName + ' without any data can show');
            }
          }
        },
        complete: function() {
          variogram = kriging.train(aqi, lng, lat, model, sigma2, alpha);
          grid = kriging.grid(worldss.features[0].geometry.rings, variogram, '0.01');
          LeftTopLc = map.latLngToContainerPoint(LeftTop);
          RightDownLc = map.latLngToContainerPoint(RightDown);
          DyWidth = RightDownLc.x - LeftTopLc.x;
          DyHeight = RightDownLc.y - LeftTopLc.y;
          canvas.width = DyWidth;
          canvas.height = DyHeight;
          kriging.plot(canvas, grid, [119.478288, 122.743647], [21.897222, 25.30555], colors);
          $('#loder').hide();
        }
      })
    };
  </script>
</body>

</html>
